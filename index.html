<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
    <title>Elite Player - IPTV Streaming</title>
    <meta name="description" content="Premium IPTV streaming with thousands of live TV channels, movies, and TV shows." />

    <!-- PWA / Chrome -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0e1a" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS / Apple (fallback) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Elite Player" />
    <link rel="apple-touch-icon" href="/assets/elite-logo.jpg" />

    <!-- Microsoft -->
    <meta name="msapplication-TileColor" content="#0a0e1a" />
    <meta name="msapplication-TileImage" content="/assets/elite-logo.jpg" />

    <!-- Favicon -->
    <link rel="icon" type="image/jpeg" href="/assets/elite-logo.jpg" />

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
